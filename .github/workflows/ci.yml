name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ekogrh
          POSTGRES_USER: ekogrh_user
          POSTGRES_PASSWORD: ekogrh_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U ekogrh_user -d ekogrh
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Run tests
        run: pytest
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ekogrh
          DB_USER: ekogrh_user
          DB_PASSWORD: ekogrh_pass
          SECRET_KEY: ci-test-key
          DEBUG: "False"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npx eslint src/

      - name: Build
        run: npm run build
