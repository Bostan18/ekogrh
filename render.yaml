services:
    - type: web
      name: ekogrh-api
      rootDir: backend
      env: python
      buildCommand: pip install -r requirements.txt
      startCommand: ./entrypoint.sh
      envVars:
          - key: DEBUG
            value: "false"
          - key: SECRET_KEY
            generateValue: true
          - key: ALLOWED_HOSTS
            value: .onrender.com
          - key: CORS_ALLOWED_ORIGINS
            sync: false
          - key: DB_HOST
            sync: false
          - key: DB_PORT
            value: "5432"
          - key: DB_NAME
            sync: false
          - key: DB_USER
            sync: false
          - key: DB_PASSWORD
            sync: false
